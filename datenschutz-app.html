<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/apple-touch-icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Datenschutzerklärung jume App – jume</title>
  <meta name="description" content="Datenschutzerklärung der jume App — Traumtagebuch, KI-Deutung, Astrologie, Cloud-Sync und mehr." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://jume.app/datenschutz-app.html" />

  <link rel="stylesheet" href="assets/css/styles.css" />
  <script defer src="assets/js/site.js"></script>
  <style>
    .legal-loading { text-align: center; padding: 48px 0; opacity: 0.5; }
    .legal-error   { text-align: center; padding: 48px 0; color: var(--error, #c0392b); }
  </style>
</head>
<body data-depth="" data-active="app">
  <div id="site-header"></div>

  <main>
    <section class="page-hero" style="padding-bottom: 48px;">
      <div class="container">
        <span class="section-kicker">Rechtliches</span>
        <h1 style="margin-bottom: 0;">Datenschutzerklärung jume App</h1>
        <p style="margin-top: 12px; opacity: 0.7;">Diese Seite beschreibt den Datenschutz für die <strong>jume App</strong> (iOS / Android). Für die Website-Datenschutzerklärung: <a href="/datenschutz.html">Datenschutz Website</a>.</p>
      </div>
    </section>

    <section class="section section-white">
      <div class="container">
        <div id="dse-content" class="legal-content">
          <p class="legal-loading">Wird geladen …</p>
        </div>
      </div>
    </section>
  </main>

  <div id="site-footer"></div>

  <script>
    (function () {
      fetch('https://api.jume.app/api/legal/datenschutz-app', {
        headers: { 'Accept': 'application/json' },
      })
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function (data) {
          var el = document.getElementById('dse-content');
          if (!el || !data || !data.content) throw new Error('Kein Inhalt');
          // The backend content wraps everything in sections — extract only
          // the inner legal-content div so we don't double-render the hero.
          var tmp = document.createElement('div');
          tmp.innerHTML = data.content;
          var inner = tmp.querySelector('.legal-content');
          el.innerHTML = inner ? inner.innerHTML : data.content;
        })
        .catch(function () {
          var el = document.getElementById('dse-content');
          if (el) {
            el.innerHTML =
              '<p class="legal-error">Die Datenschutzerklärung konnte gerade nicht geladen werden.<br>' +
              'Bitte versuche es später erneut oder kontaktiere uns unter ' +
              '<a href="mailto:info@jume.app">info@jume.app</a>.</p>';
          }
        });
    })();
  </script>
</body>
</html>
